embedding_dim: 16
num_experts: 3
expert_hidden_size: 64
tower_hidden_size: 32
loss_weights:
  like: 1.0
  long_view: 1.0
  creator_interest: 1.0
batch_size: 256
learning_rate: 0.001
epochs: 20
creator_task_enabled: false
topk: [100]
checkpoint_dir: artifacts/models/mmoe_smoke
forbidden_target_columns: [is_like, is_click, long_view, creator_interest]
device: dml
export_predictions: true
predictions_path: artifacts/models/mmoe_smoke/val_predictions.csv
run_pareto: false
metrics_dir: artifacts/models/mmoe_smoke/metrics
plots_dir: artifacts/models/mmoe_smoke/plots
use_sampler: true
primary_task: is_like
debug_print_batches: 2
use_pos_weight: true
