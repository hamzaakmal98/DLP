data:
  path: data/KuaiRand-1K.csv
  # run mode: 'full' (real data) or 'sample' (small synthetic or sample files)
  mode: full
  # optional sample directory override (used when mode=sample)
  sample_dir: data/sample
  target: is_like
  timestamp_col: timestamp
  id_cols: [user_id, video_id]
  feature_groups:
    allowed: ["user_", "video_", "meta", "hist_"]
    banned: ["click", "watch", "exposure", "future", "outcome", "label_"]

train:
  test_size: 0.2
  random_state: 42
  models: [logreg, lgbm, mlp]

models:
  logreg:
    C: 1.0
  lgbm:
    num_boost_round: 100
    learning_rate: 0.1
  mlp:
    epochs: 5
    batch_size: 128
    lr: 1e-3

output:
  dir: models
